version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - echo "Environment Variables Check:"
        - echo "VITE_WOMPI_PUBLIC_KEY=${VITE_WOMPI_PUBLIC_KEY:0:20}..."
        - echo "VITE_CHECKOUT_API_URL=$VITE_CHECKOUT_API_URL"
        - echo "VITE_WOMPI_API_BASE_URL=$VITE_WOMPI_API_BASE_URL"
    build:
      commands:
        - npm run build
        - echo "Build completed successfully"
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
